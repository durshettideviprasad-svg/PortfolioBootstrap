<!DOCTYPE html>
<html>
<head>
<title>Contact</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->

<div class="container mt-5">

<h3>Contact Me</h3>

<form onsubmit="return validateForm()">

<input type="text" id="name" class="form-control mb-3" placeholder="Name" required>

<input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

<input type="text" id="mobile" class="form-control mb-3" placeholder="Mobile" required>

<textarea class="form-control mb-3" placeholder="Message"></textarea>

<button class="btn btn-primary">Submit</button>

</form>

</div>

<script src="js/script.js"></script>
</body>
</html>
